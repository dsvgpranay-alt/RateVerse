<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Currency Converter</title>
</head>
<body>
    <div class="header">
        <div class="header-Logo"></div>
        <div class="text"><h2>RateVerse</h2>
        <p>Real-Time Currency Conversion | Precision in Every Conversion</p>
        </div>
    </div>
    <main>
        <div class="container">
            <h2>Currency Converter</h2>
            <form>
                <div class="amount">
                    <p>Enter Amount</p>
                    <input type="text" placeholder="">
                </div>
                <div class="dropdown">
                    <div class="from">
                        <p>From</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/US/flat/64.png">
                            <select name="from"></select>
                        </div>
                    </div>
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>
                    <div class="to">
                        <p>To</p>
                        <div class="select-container">
                            <img src="https://flagsapi.com/IN/flat/64.png">
                            <select name="to"></select>
                        </div>
                    </div>
                </div>
                <div class="msg">Get instant Response</div>
                <button>Get Exchange Rate</button>
            </form>
        </div>
    </main>
    </div>
    <footer>
        <p>&copy; 2026 RateVerse. All rights reserved.</p>
        <p>Developed by DSVG Pranay</p>
    </footer>
    <script src="code.js"></script>
    <script src="app.js"></script>
</body>
</html>
